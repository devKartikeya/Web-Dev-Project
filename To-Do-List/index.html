<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>To-Do-List</title>
</head>

<body>
    <div class="root">
        <header>
            <h2>Modern To-Do-List</h2>
        </header>
        <main>
            <div class="table">
                <div class="caption">
                    <span>To-Dos</span>
                    <span><button id="add">Add To-do <img src="add.svg" alt="Add"></button><button id="get">Get all To-Dos</button></span>
                </div>
                <ul id="lists">

                </ul>
            </div>
        </main>
        <button id="delete-all" class="delete-All">Delete all To-Dos</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
